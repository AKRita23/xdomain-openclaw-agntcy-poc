version: "3.8"

services:
  # --- AGNTCY Identity Service (Node Backend) ---
  agntcy-identity:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./identity-service:/app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ISSUER_DID=${AGNTCY_ISSUER_DID}
    command: ["echo", "TODO: mount agntcy/identity backend here"]

  # --- OpenClaw Agent ---
  # Connects to Open-Meteo (public API) and Slack MCP server
  openclaw-agent:
    build: .
    depends_on:
      - agntcy-identity
    env_file:
      - .env
    environment:
      - AGNTCY_IDENTITY_SERVICE_URL=http://agntcy-identity:8080
